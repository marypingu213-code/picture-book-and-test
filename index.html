<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繪本文字擷取與教學產生器</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .scanning-animation { 
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite; 
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG Icons ---
        const IconUpload = () => <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>;
        const IconPlay = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>;
        const IconCopy = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>;
        const IconTrash = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>;
        const IconBrain = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>;

        function App() {
            const [images, setImages] = useState([]);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            const [isProcessingAll, setIsProcessingAll] = useState(false);
            const [learningContent, setLearningContent] = useState(null);
            const [isGeneratingLearning, setIsGeneratingLearning] = useState(false);

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const fetchWithRetry = async (payload, retries = 5) => {
                if (!apiKey) throw new Error("請先填寫 Gemini API 金鑰");
                
                // 使用更穩定的 v1 版本 API 端點
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                for (let i = 0; i <= retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.error?.message || `API 錯誤: ${response.status}`);
                        }
                        return await response.json();
                    } catch (err) {
                        if (i === retries) throw err;
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    }
                }
            };

            const processImage = async (index) => {
                const target = images[index];
                if (target.status === 'processing') return;

                setImages(prev => prev.map((img, i) => i === index ? { ...img, status: 'processing', error: null, result: '正在處理...' } : img));

                try {
                    const base64Data = target.preview.split(',')[1];
                    const payload = {
                        contents: [{
                            parts: [
                                { text: "請擷取圖片中的文字。規則：1. 忽略國字旁邊標註讀音用的注音。2. 如果注音符號單獨出現（例如狀聲詞：磅、咚、呼呼），請保留。3. 保持原始分行。直接輸出文字內容即可。" },
                                { inlineData: { mimeType: target.file.type, data: base64Data } }
                            ]
                        }]
                    };

                    const result = await fetchWithRetry(payload);
                    const extractedText = result.candidates?.[0]?.content?.parts?.[0]?.text || "無法辨識文字";

                    setImages(prev => prev.map((img, i) => i === index ? { 
                        ...img, status: 'completed', result: extractedText.trim() 
                    } : img));
                } catch (error) {
                    setImages(prev => prev.map((img, i) => i === index ? { 
                        ...img, status: 'error', error: error.message, result: ''
                    } : img));
                }
            };

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setImages(prev => [...prev, {
                            file, 
                            preview: reader.result, 
                            status: 'idle', 
                            result: '', 
                            error: null, 
                            id: crypto.randomUUID()
                        }]);
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = null;
            };

            const generateLearningMaterials = async () => {
                const fullContent = images.map(img => img.result).filter(res => res && res !== '正在處理...').join('\n\n');
                if (!fullContent) {
                    alert("請先完成至少一張圖片的辨識");
                    return;
                }
                setIsGeneratingLearning(true);
                try {
                    const payload = {
                        contents: [{
                            parts: [{ text: `根據內容產生教學材料：1.約100字大意。2.5題選擇題（附答案）。請以繁體中文回答，並使用 JSON 格式回應：{"summary":"", "quiz":[{"question":"", "options":[], "answer":""}]}\n內容：\n${fullContent}` }]
                        }],
                        // v1 API 建議不使用 responseMimeType 如果不支持，改為在 prompt 強調
                    };
                    const result = await fetchWithRetry(payload);
                    // 嘗試解析 JSON，有時模型會多吐文字，需要整理
                    let rawText = result.candidates[0].content.parts[0].text;
                    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        setLearningContent(JSON.parse(jsonMatch[0]));
                    } else {
                        throw new Error("無法解析 AI 回傳格式");
                    }
                } catch (error) {
                    alert("教材生成失敗：" + error.message);
                } finally {
                    setIsGeneratingLearning(false);
                }
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("已複製到剪貼簿");
            };

            const processAll = async () => {
                setIsProcessingAll(true);
                for (let i = 0; i < images.length; i++) {
                    if (images[i].status !== 'completed') await processImage(i);
                }
                setIsProcessingAll(false);
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {/* API Key Input */}
                    <div className="mb-6 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col md:flex-row items-center gap-4">
                        <div className="flex items-center gap-2 text-slate-600 font-bold shrink-0">
                            🔑 API 金鑰:
                        </div>
                        <input 
                            type="password" 
                            className="w-full bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500" 
                            placeholder="請在此輸入您的 Gemini API Key..."
                            value={apiKey}
                            onChange={(e) => setApiKey(e.target.value)}
                        />
                        <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-xs text-blue-500 hover:underline shrink-0">取得金鑰</a>
                    </div>

                    <header className="text-center mb-10">
                        <h1 className="text-4xl font-extrabold text-slate-800 tracking-tight">📚 繪本教學產生器</h1>
                        <p className="text-slate-500 mt-3 text-lg">穩定版 v1 ‧ 智慧辨識 ‧ 自動產出教材</p>
                    </header>

                    {/* Upload Box */}
                    <div className="bg-white rounded-3xl shadow-sm border-2 border-dashed border-slate-300 p-10 mb-8 text-center relative group hover:border-blue-400 transition-colors">
                        <input type="file" multiple accept="image/*" onChange={handleFileUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                        <div className="flex flex-col items-center text-slate-400 group-hover:text-blue-500">
                            <IconUpload />
                            <p className="mt-4 text-lg font-bold">點擊或拖放圖片至此</p>
                            <p className="text-sm mt-1">支援多選上傳</p>
                        </div>
                    </div>

                    {images.length > 0 && (
                        <div className="flex flex-wrap justify-center gap-4 mb-10">
                            <button onClick={processAll} disabled={isProcessingAll || !apiKey} className="flex items-center gap-2 px-8 py-3 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 disabled:opacity-50 shadow-lg shadow-blue-200 transition-all font-bold">
                                {isProcessingAll ? <span className="animate-spin text-xl">⏳</span> : <IconPlay />} 開始掃描全部
                            </button>
                            <button onClick={() => copyToClipboard(images.map(i=>i.result).join('\n\n'))} className="flex items-center gap-2 px-8 py-3 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 shadow-lg shadow-emerald-200 transition-all font-bold">
                                <IconCopy /> 複製全文
                            </button>
                            <button onClick={generateLearningMaterials} disabled={isGeneratingLearning} className="flex items-center gap-2 px-8 py-3 bg-purple-600 text-white rounded-2xl hover:bg-purple-700 shadow-lg shadow-purple-200 transition-all font-bold">
                                {isGeneratingLearning ? "生成中..." : <IconBrain />} 生成教學包
                            </button>
                            <button onClick={() => {setImages([]); setLearningContent(null);}} className="px-6 py-3 bg-white text-slate-400 border border-slate-200 rounded-2xl hover:bg-slate-100 transition-all">清空</button>
                        </div>
                    )}

                    {/* Learning Section */}
                    {learningContent && (
                        <div className="bg-purple-50 rounded-3xl border border-purple-100 p-8 mb-10 shadow-sm fade-in">
                            <h2 className="text-2xl font-black text-purple-900 mb-6 flex items-center gap-2">📝 教學資源區</h2>
                            <div className="space-y-8">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-purple-100">
                                    <h3 className="text-lg font-bold text-purple-800 mb-3 border-b-2 border-purple-50 pb-2">📖 繪本大意</h3>
                                    <p className="text-slate-700 leading-relaxed italic">{learningContent.summary}</p>
                                </div>
                                <div className="space-y-4">
                                    <h3 className="text-lg font-bold text-purple-800 border-b-2 border-purple-50 pb-2">💡 閱讀理解小測驗</h3>
                                    {learningContent.quiz.map((q, idx) => (
                                        <div key={idx} className="bg-white p-5 rounded-2xl border border-purple-100 shadow-sm">
                                            <p className="font-bold text-slate-800 mb-4">{idx+1}. {q.question}</p>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                {q.options.map((opt, oi) => (
                                                    <div key={oi} className={`px-4 py-3 rounded-xl border-2 text-sm flex items-center justify-between transition-colors ${opt === q.answer ? 'bg-emerald-50 border-emerald-200 text-emerald-700 font-bold' : 'bg-slate-50 border-slate-100 text-slate-500'}`}>
                                                        {opt} {opt === q.answer && '✅'}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Image Cards */}
                    <div className="space-y-6">
                        {images.map((img, index) => (
                            <div key={img.id} className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row fade-in">
                                <div className="md:w-1/3 bg-slate-100 relative min-h-[200px]">
                                    <img src={img.preview} className="w-full h-full object-contain" />
                                    {img.status === 'processing' && (
                                        <div className="absolute inset-0 bg-blue-500/10 backdrop-blur-sm flex items-center justify-center">
                                            <div className="scanning-animation"></div>
                                            <span className="bg-white px-4 py-2 rounded-full text-xs font-black text-blue-600 shadow-xl border border-blue-100">掃描中...</span>
                                        </div>
                                    )}
                                </div>
                                <div className="flex-1 p-6 flex flex-col">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="bg-slate-100 text-slate-400 text-xs font-black px-3 py-1 rounded-full uppercase">Page {index + 1}</span>
                                        <div className="flex gap-2">
                                            {img.status === 'completed' && <span className="text-emerald-500 text-xs font-bold font-mono">DONE</span>}
                                            {img.status === 'error' && <span className="text-red-500 text-xs font-bold">ERROR</span>}
                                        </div>
                                    </div>
                                    {img.status === 'error' && (
                                        <div className="mb-2 p-2 bg-red-50 text-red-600 text-xs rounded-lg border border-red-100">
                                            {img.error}
                                        </div>
                                    )}
                                    <textarea 
                                        className="flex-1 min-h-[150px] w-full bg-slate-50 border-none focus:ring-0 text-slate-700 font-medium leading-relaxed p-4 rounded-2xl resize-none text-base"
                                        value={img.result}
                                        placeholder={img.status === 'idle' ? "等待操作..." : "辨識結果..."}
                                        onChange={(e) => {
                                            const val = e.target.value;
                                            setImages(prev => prev.map(item => item.id === img.id ? {...item, result: val, status: 'completed'} : item));
                                        }}
                                    />
                                    {img.status === 'completed' && (
                                        <div className="mt-4 flex justify-end gap-3">
                                            <button onClick={() => copyToClipboard(img.result)} className="p-3 text-slate-400 hover:text-blue-600 transition-colors bg-slate-50 rounded-xl hover:bg-blue-50"><IconCopy /></button>
                                            <button onClick={() => setImages(p => p.filter(i=>i.id !== img.id))} className="p-3 text-slate-400 hover:text-red-500 transition-colors bg-slate-50 rounded-xl hover:bg-red-50"><IconTrash /></button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
